<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos Personales</title>
</head>
<body>
    <main>
        <h1>Perfil de Usuario</h1>
        <form action="#">
            <fieldset>
                <legend>Información Personal</legend>
                <div>
                    <label for="nombre_completo">Nombre completo:</label>
                    <input type="text" id="nombre_completo" name="nombre_completo" required>
                </div>
                <div>
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" name="edad" required>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="pais">País:</label>
                    <select name="pais" id="pais" required>
                        <option value="" selected disabled>Seleccione su país</option>
                        <option value="Argentina">Argentina</option>
                        <option value="Chile">Chile</option>
                        <option value="Uruguay">Uruguay</option>
                        <option value="Paraguay">Paraguay</option>
                        <option value="Bolivia">Bolivia</option>
                    </select>
                </div>
                <div>
                    <label for="cond_laboral">Condición laboral:</label>
                    <select name="cond_laboral" id="cond_laboral" required>
                        <option value="" selected disabled>Seleccione su condición laboral</option>
                        <option value="Desempleado">Desempleado</option>
                        <option value="En búsqueda laboral">En búsqueda laboral</option>
                        <option value="Trabajo part time">Trabajo part time</option>
                        <option value="Trabajo full time">Trabajo full time</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Gustos Personales</legend>
                <div>
                    <label for="musica">Gustos musicales:</label>
                    <input type="text" id="musica" name="musica" required>
                </div>
                <div>
                    <label for="comida">Comida favorita:</label>
                    <select name="comida" id="comida" required>
                        <option value="" selected disabled>Seleccione su comida favorita</option>
                        <option value="Pizza">Pizza</option>
                        <option value="Hamburguesa">Hamburguesa</option>
                        <option value="Pasta">Pasta</option>
                        <option value="Asado">Asado</option>
                    </select>
                </div>
                <div>
                    <input type="checkbox" id="recordar_datos" name="recordar_datos">
                    <label for="recordar_datos">Recordar mis datos</label>
                </div>
                <button type="submit">Enviar formulario</button>
            </fieldset>

        </form>
    </main>
</body>
</html>
