<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas y Formularios</title>

    <style>
        table,
        td,
        th {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
        }
        table {
            width : 100%;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
            <th>Fecha de nacimiento</th>
        </tr>
        <tr>
            <td>Lorenzo</td>
            <td>Bregant</td>
            <td>28</td>
            <td>22-04-1997</td>
        </tr>
        <tr>
            <td>Pedro</td>
            <td>Peña</td>
            <td>30</td>
            <td>15-05-1993</td>
        </tr>
    </table>
</body>
</html>
