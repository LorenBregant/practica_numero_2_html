<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <main>
        <h1>Inicio de sesión</h1>
        <p>Para iniciar sesión ingrese su usuario y contraseña, luego haga clic en el botón "Iniciar sesión".</p>
        <form action="#">
            <div>
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" placeholder="Tu usuario" required>
            </div>
            <div>
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" name="contrasena" placeholder="Tu contraseña" required>
            </div>
            <div>
                <input type="checkbox" id="recuerdame" name="recuerdame">
                <label for="recuerdame">Recuérdame</label>
            </div>
            <button type="submit" name="login">Iniciar sesión</button>
        </form>
    </main>
</body>
</html>
